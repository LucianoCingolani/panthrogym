{% extends "base.html" %}
{% block title %}Registrar pago{% endblock %}

{% block content %}
 
<div class="max-w-sm mx-auto">
    <h1 class="font-condensed text-4xl font-bold uppercase text-[#111] mb-6">Registrar pago</h1>
 
    <div class="bg-white rounded-lg overflow-hidden">
        <div class="bg-[#111] px-5 py-4">
            <p class="font-condensed text-2xl font-bold text-white uppercase tracking-wide">{{ cliente.nombre }}</p>
            <p class="text-gray-400 text-sm mt-0.5">{{ cliente.plan.nombre }}</p>
        </div>
        <div class="px-5 py-5">
            <p class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Monto</p>
            <p class="font-condensed text-4xl font-bold text-[#111] mb-6">${{ cliente.plan.precio }}</p>
 
            <form method="post">
                {% csrf_token %}
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Fecha de pago</label>
                <input type="date" name="fecha_pago" value="{{ hoy }}" required
                       class="w-full border border-gray-200 rounded px-3 py-2 text-sm mb-5 focus:outline-none focus:ring-2 focus:ring-[#d4f04a]">
                <button type="submit"
                        class="w-full bg-[#d4f04a] text-[#111] font-bold uppercase tracking-widest py-3 rounded hover:bg-[#c2e038] transition text-sm">
                    Confirmar pago
                </button>
            </form>
        </div>
    </div>
 
    <a href="{% url 'dashboard' %}" class="block text-center mt-4 text-xs uppercase tracking-widest text-gray-400 hover:text-gray-600 transition">
        Cancelar
    </a>
</div>
 
{% endblock %}
