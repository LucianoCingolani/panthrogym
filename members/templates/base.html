<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PanthroGYM{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; }
        .font-condensed { font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-[#f0efe9] text-gray-900 min-h-screen">

    <nav class="bg-[#111] px-6 py-3 flex justify-between items-center">
        <a href="{% url 'dashboard' %}" class="font-condensed text-xl font-bold uppercase text-white tracking-widest">
            Panthro<span class="text-[#d4f04a]">GYM</span>
        </a>
        <div class="flex items-center gap-5">
            <button onclick="document.getElementById('modal-plan').classList.remove('hidden')"
                    class="text-gray-400 text-xs uppercase tracking-widest hover:text-white transition">
                + Nuevo plan
            </button>
            <a href="{% url 'nuevo_cliente' %}"
               class="bg-[#d4f04a] text-[#111] text-xs font-bold uppercase tracking-widest px-4 py-2 rounded hover:bg-[#c2e038] transition">
                + Nuevo cliente
            </a>
            <a href="{% url 'logout' %}" class="text-gray-500 text-xs uppercase tracking-widest hover:text-white transition">
                Salir
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <div id="modal-plan" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50"
         onclick="if(event.target===this) this.classList.add('hidden')">
        <div class="bg-white rounded-lg w-full max-w-sm mx-4 overflow-hidden">
            <div class="bg-[#111] px-5 py-4 flex justify-between items-center">
                <h2 class="font-condensed text-xl font-bold uppercase text-white tracking-wide">Nuevo plan</h2>
                <button onclick="document.getElementById('modal-plan').classList.add('hidden')"
                        class="text-gray-400 hover:text-white transition text-xl leading-none">&times;</button>
            </div>
            <form method="post" action="{% url 'crear_plan' %}" class="px-5 py-5 flex flex-col gap-4">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.path }}">
 
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Nombre del plan *</label>
                    <input type="text" name="nombre" required placeholder="Ej: Mensual full"
                           class="w-full border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#d4f04a]">
                </div>
 
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Precio *</label>
                    <input type="number" name="precio" required min="0" step="0.01" placeholder="0.00"
                           class="w-full border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#d4f04a]">
                </div>
 
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-1">Duración (días)</label>
                    <input type="number" name="duracion_dias" value="30" min="1"
                           class="w-full border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#d4f04a]">
                </div>
 
                <button type="submit"
                        class="bg-[#d4f04a] text-[#111] font-bold uppercase tracking-widest py-3 rounded hover:bg-[#c2e038] transition text-sm mt-1">
                    Guardar plan
                </button>
            </form>
        </div>
    </div>

</body>
</html>
