<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PanthroGYM{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; }
        .font-condensed { font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.05em; }
    </style>
</head>
<body class="bg-[#f0efe9] text-gray-900 min-h-screen">

    <nav class="bg-[#111] px-6 py-3 flex justify-between items-center">
        <a href="{% url 'dashboard' %}" class="font-condensed text-xl font-bold uppercase text-white tracking-widest">
            Panthro<span class="text-[#d4f04a]">GYM</span>
        </a>
        <div class="flex items-center gap-5">
            <a href="{% url 'nuevo_cliente' %}"
               class="bg-[#d4f04a] text-[#111] text-xs font-bold uppercase tracking-widest px-4 py-2 rounded hover:bg-[#c2e038] transition">
                + Nuevo cliente
            </a>
            <a href="{% url 'logout' %}" class="text-gray-500 text-xs uppercase tracking-widest hover:text-white transition">
                Salir
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
